<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Command Fixer</title>
    <link rel="stylesheet" href="./styles.css?v=default-edit-20260618" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Local command repair tool</p>
          <h1 id="page-title">AI Command Fixer</h1>
        </div>
        <p class="privacy-note">所有处理均在浏览器本地完成；默认不保存命令，主动暂存只保存在当前浏览器本地。</p>
      </header>

      <section class="workspace" aria-label="命令修复工作台">
        <section class="panel input-panel" aria-labelledby="input-title">
          <div class="panel-header">
            <div>
              <h2 id="input-title">输入</h2>
              <p>粘贴整段 AI 回复或一条需要修复的长命令；默认按单条命令处理。</p>
            </div>
          </div>

          <textarea id="inputText" spellcheck="false" placeholder="粘贴 AI 回复或命令，例如 Python -c、curl JSON、docker 命令..."></textarea>

          <div class="actions">
            <button class="primary" id="fixButton" type="button">修复命令</button>
            <div class="secondary-actions" aria-label="次要操作">
              <button class="link-button" id="sampleButton" type="button">试用示例</button>
              <button class="link-button" id="clearButton" type="button">清空</button>
            </div>
          </div>
        </section>

        <section class="panel result-panel" aria-labelledby="result-title">
          <div class="panel-header result-toolbar">
            <div>
              <h2 id="result-title">结果</h2>
              <p id="resultSummary">等待输入。</p>
            </div>
            <button id="copyAllButton" type="button" hidden>复制全部</button>
          </div>

          <div class="status" id="statusMessage" role="status">
            粘贴内容后点击“修复命令”，结果会显示在这里。
          </div>

          <div class="results" id="resultsList" aria-live="polite"></div>
        </section>
      </section>

      <section class="stash-section" aria-label="本地暂存">
        <details class="local-stash" id="localStashPanel">
          <summary id="localStashSummary">本地暂存（0/20）</summary>
          <div class="stash-body">
            <div class="stash-intro">
              <p>暂存内容仅保存在当前浏览器本地，过期自动清理。默认不会保存任何命令，只有点击结果附近的“暂存”才会保存修复后的完整命令。</p>
              <div class="stash-controls">
                <label for="stashTtl">
                  <span>过期时间</span>
                  <select id="stashTtl" aria-label="暂存过期时间"></select>
                </label>
                <button class="subtle-button" id="clearStashButton" type="button">清空全部</button>
              </div>
            </div>
            <div class="stash-message" id="stashMessage" role="status">暂存内容仅保存在当前浏览器本地，过期自动清理。</div>
            <div class="stash-list" id="stashList"></div>
          </div>
        </details>
      </section>

      <section class="settings-section" aria-label="偏好设置">
        <details class="settings" id="settingsPanel">
          <summary>设置</summary>
          <div class="settings-body">
            <div class="setting-row">
              <label for="showOriginal">
                <span>显示原始片段</span>
                <small>用于核对工具识别了哪一段文本。</small>
              </label>
              <input id="showOriginal" type="checkbox" />
            </div>
            <div class="setting-row">
              <label for="showDiff">
                <span>显示修复摘要</span>
                <small>展示合并换行、续行等说明。</small>
              </label>
              <input id="showDiff" type="checkbox" />
            </div>
            <label class="prefix-field" for="customPrefixes">
              <span>自定义命令前缀</span>
              <textarea id="customPrefixes" spellcheck="false" rows="3" placeholder="每行一个，例如：uv&#10;terraform&#10;ansible-playbook"></textarea>
            </label>
            <button class="subtle-button" id="resetPrefsButton" type="button">清除本地偏好</button>
          </div>
        </details>
      </section>
    </main>

    <script type="module" src="./src/app.js?v=default-edit-20260618"></script>
  </body>
</html>
